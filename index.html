<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nysak Staff Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surf: #141720;
  --surf2: #1a1e28;
  --bdr: #252a38;
  --txt: #e2e4ec;
  --txt2: #8b90a0;
  --txt3: #555a6e;
  --acc: #5865f2;
  --grn: #3ba55d;
  --red: #ed4245;
  --ylw: #faa61a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--txt); min-height: 100vh; display: flex; }
.sidebar { width: 210px; min-height: 100vh; background: var(--surf); border-right: 1px solid var(--bdr); padding: 20px 12px; display: flex; flex-direction: column; gap: 4px; position: fixed; top: 0; left: 0; bottom: 0; }
.logo { font-size: 15px; font-weight: 600; color: var(--txt); padding: 4px 8px 16px; border-bottom: 1px solid var(--bdr); margin-bottom: 10px; letter-spacing: 0.5px; }
.logo em { color: var(--acc); font-style: normal; }
.logo span { font-size: 10px; color: var(--txt3); font-weight: 400; }
.nav { display: flex; align-items: center; gap: 9px; padding: 9px 11px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--txt2); border: none; background: none; width: 100%; text-align: left; transition: all 0.15s; }
.nav:hover { background: var(--surf2); color: var(--txt); }
.nav.active { background: rgba(88,101,242,0.18); color: var(--acc); }
.nav svg { width: 16px; height: 16px; flex-shrink: 0; }
.unread { margin-left: auto; background: var(--red); color: #fff; font-size: 10px; font-weight: 600; border-radius: 100px; padding: 1px 6px; display: none; }
.sf { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--bdr); }
.sf label { font-size: 10px; color: var(--txt3); padding: 0 4px 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
.sf input { width: 100%; font-size: 12px; padding: 7px 9px; border-radius: 7px; border: 1px solid var(--bdr); background: var(--surf2); color: var(--txt); outline: none; }
.sf input:focus { border-color: var(--acc); }
.sf button { width: 100%; margin-top: 6px; padding: 7px; border-radius: 7px; background: var(--acc); color: #fff; border: none; cursor: pointer; font-size: 12px; font-weight: 500; transition: opacity 0.15s; }
.sf button:hover { opacity: 0.85; }
.dot-row { display: flex; align-items: center; gap: 7px; padding: 8px 4px 10px; font-size: 11px; color: var(--txt2); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--txt3); flex-shrink: 0; }
.dot.online { background: var(--grn); }
.main { margin-left: 210px; flex: 1; padding: 28px; }
.page { display: none; }
.page.active { display: block; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.page-title { font-size: 18px; font-weight: 600; }
.notice { font-size: 12px; background: rgba(250,166,26,0.1); color: var(--ylw); border: 1px solid rgba(250,166,26,0.25); border-radius: 8px; padding: 8px 12px; margin-bottom: 16px; display: none; align-items: center; gap: 8px; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat { background: var(--surf); border-radius: 10px; padding: 14px 16px; }
.stat-label { font-size: 11px; color: var(--txt3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.stat-value { font-size: 24px; font-weight: 600; }
.stat-value.blue { color: var(--acc); }
.stat-value.green { color: var(--grn); }
.stat-value.red { color: var(--red); }
.stat-value.yellow { color: var(--ylw); }
.card { background: var(--surf); border: 1px solid var(--bdr); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
.card-title { font-size: 13px; font-weight: 500; color: var(--txt); margin-bottom: 12px; }
.recent-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--bdr); cursor: pointer; }
.recent-item:last-child { border-bottom: none; }
.recent-item:hover .ri-name { color: var(--acc); }
.av { width: 30px; height: 30px; border-radius: 50%; background: rgba(88,101,242,0.2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--acc); flex-shrink: 0; }
.ri-info { flex: 1; min-width: 0; }
.ri-name { font-size: 12px; font-weight: 500; color: var(--txt); transition: color 0.1s; }
.ri-preview { font-size: 11px; color: var(--txt3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ri-time { font-size: 10px; color: var(--txt3); font-family: monospace; }
.inbox-layout { display: grid; grid-template-columns: 220px 1fr; gap: 14px; height: calc(100vh - 130px); }
.inbox-list { background: var(--surf); border: 1px solid var(--bdr); border-radius: 12px; overflow-y: auto; }
.inbox-entry { display: flex; align-items: center; gap: 9px; padding: 11px 13px; cursor: pointer; border-bottom: 1px solid var(--bdr); transition: background 0.1s; }
.inbox-entry:last-child { border-bottom: none; }
.inbox-entry:hover { background: var(--surf2); }
.inbox-entry.active { background: rgba(88,101,242,0.12); border-left: 2px solid var(--acc); }
.inbox-entry .av { width: 32px; height: 32px; }
.ie-info { flex: 1; min-width: 0; }
.ie-name { font-size: 12px; font-weight: 500; color: var(--txt); }
.ie-preview { font-size: 11px; color: var(--txt3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
.ie-badge { background: rgba(88,101,242,0.3); color: #a8b0ff; font-size: 10px; font-weight: 600; border-radius: 100px; padding: 1px 6px; flex-shrink: 0; }
.convo { background: var(--surf); border: 1px solid var(--bdr); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
.convo-header { padding: 12px 16px; border-bottom: 1px solid var(--bdr); display: flex; align-items: center; gap: 10px; }
.convo-name { font-size: 13px; font-weight: 500; }
.convo-uid { font-size: 11px; color: var(--txt3); font-family: monospace; }
.convo-msgs { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 9px; }
.msg { max-width: 78%; }
.msg.from-user { align-self: flex-start; }
.msg.from-staff { align-self: flex-end; }
.msg-bubble { padding: 8px 12px; border-radius: 10px; font-size: 12px; line-height: 1.5; }
.from-user .msg-bubble { background: var(--surf2); color: var(--txt); border-bottom-left-radius: 2px; }
.from-staff .msg-bubble { background: rgba(88,101,242,0.25); color: #c5caff; border-bottom-right-radius: 2px; }
.from-staff.plain .msg-bubble { background: var(--surf2); color: var(--txt); border: 1px solid var(--bdr); }
.msg-meta { font-size: 10px; color: var(--txt3); margin-top: 3px; font-family: monospace; }
.from-staff .msg-meta { text-align: right; }
.empty-state { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--txt3); }
.convo-input { padding: 12px 14px; border-top: 1px solid var(--bdr); display: flex; flex-direction: column; gap: 8px; }
.convo-input textarea { width: 100%; font-size: 12px; padding: 8px 11px; border-radius: 8px; border: 1px solid var(--bdr); background: var(--surf2); color: var(--txt); resize: none; outline: none; font-family: 'Inter', sans-serif; }
.convo-input textarea:focus { border-color: var(--acc); }
.convo-input textarea::placeholder { color: var(--txt3); }
.reply-btns { display: flex; gap: 8px; }
.reply-btns button { flex: 1; padding: 7px; border-radius: 7px; font-size: 11px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
.reply-btns button:hover { opacity: 0.8; }
.btn-embed { background: var(--acc); color: #fff; border: none; }
.btn-plain { background: var(--surf2); color: var(--txt2); border: 1px solid var(--bdr); }
.ban-table { width: 100%; border-collapse: collapse; }
.ban-table th { padding: 10px 12px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--txt3); border-bottom: 1px solid var(--bdr); }
.ban-table td { padding: 11px 12px; font-size: 12px; border-bottom: 1px solid var(--bdr); color: var(--txt); }
.ban-table tr:last-child td { border-bottom: none; }
.ban-table tr:hover td { background: rgba(255,255,255,0.02); }
.uid-mono { font-family: monospace; font-size: 11px; color: var(--txt3); }
.reason-pill { background: rgba(237,66,69,0.15); color: #ff7b7d; font-size: 11px; padding: 2px 8px; border-radius: 100px; display: inline-block; }
.empty-table { padding: 24px; text-align: center; font-size: 12px; color: var(--txt3); }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 3px; }
#pw-gate { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
#pw-box { background: var(--surf); border: 1px solid var(--bdr); border-radius: 14px; padding: 32px 28px; width: 320px; display: flex; flex-direction: column; gap: 16px; }
#pw-box .pw-logo { font-size: 16px; font-weight: 600; text-align: center; letter-spacing: 0.5px; }
#pw-box .pw-logo em { color: var(--acc); font-style: normal; }
#pw-box .pw-sub { font-size: 12px; color: var(--txt3); text-align: center; }
#pw-input { width: 100%; font-size: 13px; padding: 9px 12px; border-radius: 8px; border: 1px solid var(--bdr); background: var(--surf2); color: var(--txt); outline: none; font-family: 'Inter', sans-serif; }
#pw-input:focus { border-color: var(--acc); }
#pw-btn { width: 100%; padding: 9px; border-radius: 8px; background: var(--acc); color: #fff; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity 0.15s; }
#pw-btn:hover { opacity: 0.85; }
#pw-err { font-size: 11px; color: var(--red); text-align: center; display: none; }
</style>
</head>
<body>

<div id="pw-gate">
  <div id="pw-box">
    <div class="pw-logo">NYS<em>AK</em> <span style="font-size:11px;color:var(--txt3);font-weight:400">staff</span></div>
    <div class="pw-sub">Enter your password to continue</div>
    <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
    <button id="pw-btn" onclick="checkPw()">Unlock</button>
    <div id="pw-err">Incorrect password. Try again.</div>
  </div>
</div>

<aside class="sidebar">
  <div class="logo">NYS<em>AK</em> <span>staff</span></div>
  <button class="nav active" onclick="showPage('overview', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Overview
  </button>
  <button class="nav" onclick="showPage('inbox', this)" id="nav-inbox">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    DM Inbox
    <span class="unread" id="unread-badge">0</span>
  </button>
  <button class="nav" onclick="showPage('bans', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
    Bans
  </button>
  <div class="sf">
    <label>Bot API URL</label>
    <input type="text" id="bot-url" placeholder="http://193.70.34.27:20035" value="http://193.70.34.27:20035">
    <button onclick="connect()">Connect</button>
    <div class="dot-row">
      <div class="dot" id="bot-dot"></div>
      <span id="bot-status">Not connected</span>
    </div>
  </div>
</aside>

<main class="main">

  <!-- Overview -->
  <div class="page active" id="page-overview">
    <div class="page-header"><div class="page-title">Overview</div></div>
    <div class="notice" id="conn-notice">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="conn-msg"></span>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-label">Members</div><div class="stat-value blue" id="s-members">—</div></div>
      <div class="stat"><div class="stat-label">Online</div><div class="stat-value green" id="s-online">—</div></div>
      <div class="stat"><div class="stat-label">Bans</div><div class="stat-value red" id="s-bans">—</div></div>
      <div class="stat"><div class="stat-label">Channels</div><div class="stat-value yellow" id="s-channels">—</div></div>
    </div>
    <div class="card">
      <div class="card-title">Recent DMs</div>
      <div id="recent-dms"><div style="font-size:12px;color:var(--txt3)">Enter your bot URL and click Connect.</div></div>
    </div>
  </div>

  <!-- Inbox -->
  <div class="page" id="page-inbox">
    <div class="page-header"><div class="page-title">DM Inbox</div></div>
    <div class="inbox-layout">
      <div class="inbox-list" id="inbox-list">
        <div style="padding:14px;font-size:12px;color:var(--txt3)">No messages yet</div>
      </div>
      <div class="convo" id="convo-panel">
        <div class="empty-state">Select a conversation</div>
      </div>
    </div>
  </div>

  <!-- Bans -->
  <div class="page" id="page-bans">
    <div class="page-header"><div class="page-title">Ban Log</div></div>
    <div class="card">
      <table class="ban-table">
        <thead><tr><th>User</th><th>User ID</th><th>Reason</th><th>Date</th></tr></thead>
        <tbody id="ban-tbody"><tr><td colspan="4"><div class="empty-table">No bans recorded</div></td></tr></tbody>
      </table>
    </div>
  </div>

</main>

<script>
let pwAttempts = 0;
const PW_MAX = 3;
const PW_LOCKOUT_MS = 5 * 60 * 1000;

function setLocked(until) { sessionStorage.setItem('pw_locked_until', until); }
function getLocked() { const v = sessionStorage.getItem('pw_locked_until'); return v ? parseInt(v) : 0; }

function checkLockout() {
  const until = getLocked();
  if (!until) return false;
  const remaining = until - Date.now();
  if (remaining <= 0) { sessionStorage.removeItem('pw_locked_until'); pwAttempts = 0; return false; }
  showLockoutMsg(remaining);
  return true;
}

function showLockoutMsg(remaining) {
  const mins = Math.ceil(remaining / 60000);
  const err = document.getElementById('pw-err');
  err.textContent = 'Too many attempts. Locked out for ' + mins + ' minute' + (mins !== 1 ? 's' : '') + '.';
  err.style.display = 'block';
  document.getElementById('pw-input').disabled = true;
  document.getElementById('pw-btn').disabled = true;
  document.getElementById('pw-btn').style.opacity = '0.4';
  if (window._lockTimer) clearInterval(window._lockTimer);
  window._lockTimer = setInterval(() => {
    const left = getLocked() - Date.now();
    if (left <= 0) {
      clearInterval(window._lockTimer);
      const err2 = document.getElementById('pw-err');
      err2.style.display = 'none';
      document.getElementById('pw-input').disabled = false;
      document.getElementById('pw-btn').disabled = false;
      document.getElementById('pw-btn').style.opacity = '';
      document.getElementById('pw-input').focus();
      pwAttempts = 0;
    } else {
      const m = Math.ceil(left / 60000);
      err.textContent = 'Too many attempts. Locked out for ' + m + ' minute' + (m !== 1 ? 's' : '') + '.';
    }
  }, 1000);
}

async function checkPw() {
  if (checkLockout()) return;
  const val = document.getElementById('pw-input').value;
  const enc = new TextEncoder().encode(val);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  if (hash === '8f8895c1c80a50766149d37e785737ce398ae07bfd7c0b98ebbf1f0dac842eb0') {
    document.getElementById('pw-gate').style.display = 'none';
    pwAttempts = 0;
    poll();
  } else {
    pwAttempts++;
    const remaining = PW_MAX - pwAttempts;
    const err = document.getElementById('pw-err');
    if (pwAttempts >= PW_MAX) {
      setLocked(Date.now() + PW_LOCKOUT_MS);
      showLockoutMsg(PW_LOCKOUT_MS);
    } else {
      err.textContent = 'Incorrect password. ' + remaining + ' attempt' + (remaining !== 1 ? 's' : '') + ' remaining.';
      err.style.display = 'block';
    }
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
document.addEventListener('DOMContentLoaded', () => {
  if (checkLockout()) return;
  document.getElementById('pw-input').focus();
});

let BOT_URL = 'http://193.70.34.27:20035';
let inboxData = [];
let currentUserId = null;

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
}

function connect() {
  BOT_URL = document.getElementById('bot-url').value.trim().replace(/\/$/, '');
  poll();
}

function ini(name) { return name ? name.slice(0, 2).toUpperCase() : '??'; }
function ago(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return new Date(ts).toLocaleDateString();
}
function fmt(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function apiFetch(path) {
  try {
    const r = await fetch(BOT_URL + path, { mode: 'cors' });
    return r.ok ? await r.json() : null;
  } catch { return null; }
}

async function apiPost(path, data) {
  try {
    const r = await fetch(BOT_URL + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
      mode: 'cors'
    });
    return r.ok ? await r.json() : null;
  } catch { return null; }
}

async function loadStats() {
  const d = await apiFetch('/api/stats');
  const dot = document.getElementById('bot-dot');
  const status = document.getElementById('bot-status');
  const notice = document.getElementById('conn-notice');
  if (!d) {
    dot.classList.remove('online');
    status.textContent = 'Unreachable';
    notice.style.display = 'flex';
    document.getElementById('conn-msg').textContent = 'Cannot reach bot — make sure it is running and the URL is correct.';
    return;
  }
  notice.style.display = 'none';
  dot.classList.toggle('online', !!d.bot_online);
  status.textContent = d.bot_online ? 'Online' : 'Offline';
  document.getElementById('s-members').textContent = d.member_count ?? '—';
  document.getElementById('s-online').textContent = d.online_count ?? '—';
  document.getElementById('s-bans').textContent = d.ban_count ?? '—';
  document.getElementById('s-channels').textContent = d.channel_count ?? '—';
}

async function loadInbox() {
  const d = await apiFetch('/api/inbox');
  if (!d) return;
  inboxData = d;
  renderInboxList();
  renderRecent();
  const unread = d.reduce((a, e) => a + (e.unread || 0), 0);
  const badge = document.getElementById('unread-badge');
  badge.style.display = unread ? 'inline' : 'none';
  badge.textContent = unread;
}

function renderInboxList() {
  const el = document.getElementById('inbox-list');
  if (!inboxData.length) {
    el.innerHTML = '<div style="padding:14px;font-size:12px;color:var(--txt3)">No messages yet</div>';
    return;
  }
  el.innerHTML = inboxData.map(e => {
    const last = e.messages?.[e.messages.length - 1];
    return `<div class="inbox-entry ${currentUserId === e.user_id ? 'active' : ''}" onclick="openConvo('${e.user_id}')">
      <div class="av">${ini(e.username)}</div>
      <div class="ie-info">
        <div class="ie-name">${e.username}</div>
        <div class="ie-preview">${last ? last.content || '[file]' : ''}</div>
      </div>
      ${e.unread ? `<span class="ie-badge">${e.unread}</span>` : ''}
    </div>`;
  }).join('');
}

function renderRecent() {
  const el = document.getElementById('recent-dms');
  if (!inboxData.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--txt3)">No recent messages</div>';
    return;
  }
  el.innerHTML = inboxData.slice(0, 5).map(e => {
    const last = e.messages?.[e.messages.length - 1];
    return `<div class="recent-item" onclick="showPage('inbox', document.getElementById('nav-inbox')); openConvo('${e.user_id}')">
      <div class="av">${ini(e.username)}</div>
      <div class="ri-info">
        <div class="ri-name">${e.username}</div>
        <div class="ri-preview">${last ? last.content || '[file]' : ''}</div>
      </div>
      <div class="ri-time">${ago(e.last_seen)}</div>
    </div>`;
  }).join('');
}

async function openConvo(userId) {
  currentUserId = userId;
  const entry = inboxData.find(e => e.user_id === userId);
  if (!entry) return;
  await apiPost('/api/mark_read', { user_id: userId });
  entry.unread = 0;
  renderInboxList();
  const panel = document.getElementById('convo-panel');
  panel.innerHTML = `
    <div class="convo-header">
      <div class="av">${ini(entry.username)}</div>
      <div>
        <div class="convo-name">${entry.username}</div>
        <div class="convo-uid">${entry.user_id}</div>
      </div>
    </div>
    <div class="convo-msgs" id="convo-msgs">
      ${(entry.messages || []).map(m => `
        <div class="msg ${m.from_staff ? 'from-staff' + (m.plain ? ' plain' : '') : 'from-user'}">
          <div class="msg-bubble">${m.content || '[file]'}</div>
          <div class="msg-meta">${m.from_staff ? (m.staff_name || 'Staff') + ' · ' : ''}${fmt(m.timestamp)}${m.plain ? ' · plain' : ''}</div>
        </div>`).join('')}
    </div>
    <div class="convo-input">
      <textarea id="reply-input" rows="2" placeholder="Type a reply..."></textarea>
      <div class="reply-btns">
        <button class="btn-embed" onclick="sendReply(false)">Send as staff embed</button>
        <button class="btn-plain" onclick="sendReply(true)">Send as plain text</button>
      </div>
    </div>`;
  const msgs = document.getElementById('convo-msgs');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

async function sendReply(plain) {
  const input = document.getElementById('reply-input');
  const content = input.value.trim();
  if (!content || !currentUserId) return;
  const r = await apiPost('/api/reply', { user_id: currentUserId, content, plain });
  if (r?.ok) {
    input.value = '';
    await loadInbox();
    openConvo(currentUserId);
  } else {
    alert('Failed to send — is the bot reachable?');
  }
}

async function loadBans() {
  const d = await apiFetch('/api/bans');
  const tbody = document.getElementById('ban-tbody');
  if (!d || !d.length) {
    tbody.innerHTML = '<tr><td colspan="4"><div class="empty-table">No bans recorded</div></td></tr>';
    return;
  }
  tbody.innerHTML = d.map(b => `
    <tr>
      <td>${b.username || 'Unknown'}</td>
      <td><span class="uid-mono">${b.user_id}</span></td>
      <td><span class="reason-pill">${b.reason || 'No reason'}</span></td>
      <td><span class="uid-mono">${b.timestamp ? new Date(b.timestamp).toLocaleDateString() : '—'}</span></td>
    </tr>`).join('');
}

async function poll() {
  await loadStats();
  await loadInbox();
  await loadBans();
}

setInterval(() => { if (document.getElementById('pw-gate').style.display === 'none') poll(); }, 15000);
</script>
</body>
</html>
